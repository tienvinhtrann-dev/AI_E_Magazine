<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - AI E-Magazine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-icon">
                    <img src="/static/images/logo.png" alt="Logo" style="height: 90px; width: 90px; object-fit: contain; display:block; margin:0 auto;">
                </div>
                <h1>Đổi mật khẩu</h1>
                <p class="auth-subtitle">Đặt mật khẩu mới để dễ nhớ</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} fade-in">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <div class="input-group">
                    <input type="password" name="old_password" placeholder="Mật khẩu hiện tại" required autocomplete="current-password">
                </div>
                <div class="input-group">
                    <input type="password" name="new_password" placeholder="Mật khẩu mới (ít nhất 6 ký tự)" required autocomplete="new-password">
                </div>
                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu mới" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-submit">
                    <span>Cập nhật mật khẩu</span>
                </button>
            </form>

            <div class="auth-footer">
                <p class="auth-link">
                    <a href="/dashboard?tab=stats">Quay lại Dashboard</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
