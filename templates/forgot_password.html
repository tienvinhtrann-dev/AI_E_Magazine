<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - AI E-Magazine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-icon">
                    <img src="/static/images/logo.png" alt="Logo" style="height: 90px; width: 90px; object-fit: contain; display:block; margin:0 auto;">
                </div>
                <h1>Quên mật khẩu</h1>
                <p class="auth-subtitle">Nhập email để nhận mật khẩu tạm thời</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} fade-in">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email đăng ký" required autocomplete="email">
                </div>
                <button type="submit" class="btn-submit">
                    <span>Gửi mật khẩu về email</span>
                </button>
            </form>

            <div class="auth-footer">
                <p class="auth-link">
                    Đã nhớ mật khẩu? <a href="/login">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
