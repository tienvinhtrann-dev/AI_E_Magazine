<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AI E-Magazine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Header Section -->
            <div class="auth-header">
                <div class="auth-icon">
                    <img src="/static/images/logo.png" alt="Logo" style="height: 96px; width: 96px; object-fit: contain; background: transparent; border-radius: 12px; display: block; margin: 0 auto;">
                </div>
                <h1>Đăng nhập</h1>
                <p class="auth-subtitle">Hệ Thống tạo tạp chí bằng AI</p>
            </div>
            
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} fade-in">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <!-- Login Form -->
            <form method="POST" class="auth-form">
                <div class="input-group">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <input type="email" name="email" placeholder="Email" required autocomplete="email">
                </div>
                
                <div class="input-group">
                    <div style="position: relative; width: 100%; display: flex; align-items: center;">
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="11" width="18" height="11" rx="2" stroke="#667eea" stroke-width="2"/>
                                <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <input type="password" name="password" placeholder="Mật khẩu" required autocomplete="current-password" id="login-password" style="width: 100%;">
                        <span class="toggle-password" onclick="togglePassword('login-password', this)" style="cursor:pointer; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display:flex; align-items:center;">
                            <svg width="22" height="22" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </span>
                    </div>
                </div>
                <div style="text-align:right; margin-top:-8px; margin-bottom:12px;">
                    <a href="/forgot-password" style="font-size:0.95rem; color:#667eea; text-decoration:none; font-weight:600;">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-submit">
                    <span>Đăng nhập</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <div class="auth-separator">
                <span>hoặc</span>
            </div>

            <a class="btn-google" href="/auth/google">
                <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.4-.8 2.6-1.7 3.4l2.8 2.2c1.7-1.6 2.7-4 2.7-6.8 0-.6-.1-1.1-.1-1.6H12z"/>
                    <path fill="#34A853" d="M6.1 14.2l-.8.6-2.4 1.9C4.3 19.6 8 22 12 22c2.8 0 5.1-.9 6.8-2.4l-2.8-2.2c-.8.6-1.9 1-3.4 1-2.6 0-4.8-1.7-5.6-4.2z"/>
                    <path fill="#FBBC05" d="M2.9 6.9C2.2 8.2 1.8 9.6 1.8 11s.4 2.8 1.1 4.1l4.2-3.3C7 10.9 7 10.4 7 10s0-.9.1-1.3l-4.2-1.8z"/>
                    <path fill="#4285F4" d="M12 4.2c1.5 0 2.8.5 3.8 1.5l2.9-2.9C16.9 1.2 14.7.2 12 .2 8 0 4.3 2.4 2.9 6.9l4.2 1.8C7.8 6 9.7 4.2 12 4.2z"/>
                </svg>
                <span>Đăng nhập với Google</span>
            </a>
            
            <!-- Footer Links -->
            <div class="auth-footer">
                <p class="auth-link">
                    Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
                </p>
            </div>
        </div>
        
        <!-- Background Animation -->
        <div class="bg-animation">
                <script>
                function togglePassword(inputId, el) {
                    const input = document.getElementById(inputId);
                    if (input.type === 'password') {
                        input.type = 'text';
                        el.innerHTML = `<svg width="22" height="22" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-6.06M1 1l22 22"/><path d="M9.53 9.53A3 3 0 0 0 12 15a3 3 0 0 0 2.47-5.47"/></svg>`;
                    } else {
                        input.type = 'password';
                        el.innerHTML = `<svg width="22" height="22" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
                    }
                }
                </script>
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>
</body>
</html>
