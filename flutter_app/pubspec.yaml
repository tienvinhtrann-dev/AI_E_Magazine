name: ai_magazine
description: AI E-Magazine - Ứng dụng đọc tạp chí thông minh

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & cookie (giữ session với Flask backend)
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.2

  # UI helpers
  cached_network_image: ^3.3.1
  flutter_html: ^3.0.0-beta.2
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Web wrapper (để UI giống web 1:1)
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
