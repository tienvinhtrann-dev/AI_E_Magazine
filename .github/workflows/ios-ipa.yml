name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FLUTTER_VERSION: "3.44.0"
      FLUTTER_CHANNEL: "stable"
      # Đổi IP cho đúng với máy bạn (điện thoại thật + cùng WiFi)
      BASE_URL: "https://clean-cathedral-rocking.ngrok-free.dev"

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build iOS app (no codesign)
        working-directory: flutter_app
        run: >
          flutter build ios
          --release
          --no-codesign
          --dart-define=BASE_URL=${{ env.BASE_URL }}

      - name: Debug build output
        working-directory: flutter_app
        run: |
          ls -la build/ios || true
          ls -la build/ios/iphoneos || true

      - name: Package unsigned IPA
        working-directory: flutter_app
        run: |
          rm -f AI_E_Magazine-unsigned.ipa || true
          rm -rf Payload || true
          mkdir -p Payload

          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r AI_E_Magazine-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: flutter_app/AI_E_Magazine-unsigned.ipa
          if-no-files-found: error
